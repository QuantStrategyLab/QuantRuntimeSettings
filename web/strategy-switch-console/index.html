<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>QuantRuntimeSettings Strategy Switch</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --soft: #eef1f4;
      --ink: #16191f;
      --muted: #66707c;
      --line: #dce1e7;
      --line-strong: #b8c2cc;
      --accent: #136f63;
      --accent-ink: #ffffff;
      --danger: #b54137;
      --lb: #0f766e;
      --ib: #2f5f9f;
      --sw: #9b4153;
      --ft: #94651f;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(180deg, #fbfcfd 0, #eef2f5 100%);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    button:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--platform-color, var(--accent)) 24%, transparent);
      outline-offset: 2px;
    }

    [hidden] {
      display: none !important;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 17px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 251, 252, 0.88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.12;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .brand p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .auth-status {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shell {
      width: min(1160px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 22px 0 32px;
      display: grid;
      gap: 16px;
    }

    body.app-loading .shell {
      display: none;
    }

    body:not(.app-loading) .boot-screen {
      display: none;
    }

    .boot-screen {
      width: min(680px, calc(100vw - 36px));
      min-height: calc(100svh - 72px);
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 34px 0;
    }

    .boot-panel {
      display: grid;
      gap: 13px;
      padding: 8px 0;
    }

    .boot-kicker {
      color: var(--accent);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 800;
      text-transform: uppercase;
    }

    .boot-panel h2 {
      color: var(--ink);
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.04;
      font-weight: 820;
    }

    .boot-panel p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      max-width: 520px;
    }

    .loading-track {
      width: 100%;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: #dde4ea;
    }

    .loading-track::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: loading-sweep 1.05s ease-in-out infinite;
    }

    .pill,
    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 740;
      box-shadow: 0 1px 0 rgba(22, 25, 31, 0.03);
    }

    .pill {
      padding: 0 12px;
      border-radius: 999px;
    }

    .pill.ready {
      border-color: rgba(19, 111, 99, 0.28);
      background: #eff9f6;
      color: var(--accent);
    }

    .btn {
      padding: 0 13px;
      border-radius: 8px;
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #fafbfc;
    }

    .lang-toggle {
      min-width: 42px;
      padding: 0 10px;
    }

    .mode button {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 760;
      transition: background 150ms ease, color 150ms ease;
    }

    .mode button.active {
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 1px 7px rgba(22, 25, 31, 0.08);
    }

    .platform-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
    }

    .platform-button {
      min-width: 0;
      min-height: 92px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--platform-color);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      text-align: left;
      transition:
        transform 150ms ease,
        border-color 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
    }

    .platform-button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .platform-button.active {
      border-color: var(--platform-color);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--platform-color) 7%, white), #ffffff 68%);
      box-shadow: 0 14px 30px rgba(22, 25, 31, 0.09);
    }

    .platform-button[data-platform="longbridge"] {
      --platform-color: var(--lb);
    }

    .platform-button[data-platform="ibkr"] {
      --platform-color: var(--ib);
    }

    .platform-button[data-platform="schwab"] {
      --platform-color: var(--sw);
    }

    .platform-button[data-platform="firstrade"] {
      --platform-color: var(--ft);
    }

    .mark {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: color-mix(in srgb, var(--platform-color) 12%, white);
      color: var(--platform-color);
      font-size: 13px;
      font-weight: 840;
      transition: background 150ms ease, color 150ms ease;
    }

    .platform-button.active .mark {
      background: var(--platform-color);
      color: #ffffff;
    }

    .platform-copy {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .platform-copy strong {
      font-size: 16px;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .platform-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .platform-copy small {
      color: var(--platform-color);
      font-size: 11px;
      line-height: 1.25;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .switch-surface {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(320px, 0.96fr);
      gap: 18px;
      align-items: stretch;
    }

    .switch-surface.summary-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .switch-panel,
    .summary-panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 14px 34px rgba(22, 25, 31, 0.07);
    }

    .switch-panel {
      display: grid;
      gap: 20px;
      padding: 22px;
    }

    .panel-head {
      display: grid;
      gap: 5px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 780;
      text-transform: uppercase;
    }

    .panel-head h2 {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.08;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .quick-form {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 14px;
    }

    .control-block {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    select {
      width: 100%;
      min-width: 0;
      height: 48px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      font-size: 14px;
      font-weight: 680;
      overflow: hidden;
      padding-right: 42px;
      text-overflow: ellipsis;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    select:focus {
      border-color: var(--platform-color, var(--accent));
      box-shadow: 0 0 0 3px rgba(19, 111, 99, 0.12);
    }

    .selection-meta {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .mode {
      height: 48px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .mode button {
      font-size: 13px;
    }

    .run-area {
      display: grid;
      gap: 10px;
      padding-top: 2px;
    }

    .public-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 560px;
    }

    .run-button {
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      background: var(--platform-color, var(--accent));
      color: var(--accent-ink);
      font-size: 16px;
      font-weight: 820;
      transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
    }

    .run-button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(0.92);
    }

    .run-button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .action-note {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .action-note.warning {
      color: var(--danger);
      font-weight: 720;
    }

    .summary-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .summary-head h2 {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 800;
    }

    .summary-list {
      margin: 0;
      padding: 8px 16px;
      display: grid;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eef1f4;
      align-items: start;
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .summary-row dt {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      font-weight: 760;
    }

    .summary-row dd {
      margin: 0;
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 680;
      overflow-wrap: anywhere;
    }

    .summary-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 15px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }

    .toast {
      min-height: 20px;
      color: var(--accent);
      font-size: 13px;
      line-height: 1.45;
    }

    .quiet {
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .platform-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .switch-surface {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
        padding: 18px;
      }

      .top-actions {
        justify-content: flex-start;
        width: 100%;
      }

      .boot-screen {
        width: min(100% - 28px, 680px);
        min-height: calc(100svh - 122px);
        padding-top: 22px;
      }

      .shell {
        width: min(100% - 28px, 1160px);
        padding-top: 18px;
      }

      .platform-strip,
      .quick-form {
        grid-template-columns: 1fr;
      }

      .switch-panel {
        padding: 18px;
      }

      .summary-row {
        grid-template-columns: 1fr;
        gap: 3px;
      }

      select {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .platform-strip,
      .switch-surface {
        animation: rise-in 260ms ease both;
      }

      .switch-surface {
        animation-delay: 60ms;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes loading-sweep {
        from {
          transform: translateX(-110%);
        }
        to {
          transform: translateX(260%);
        }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-track::before {
        animation: none;
        transform: translateX(0);
      }
    }
  </style>
</head>
<body class="app-loading">
  <header class="topbar">
    <div class="brand">
      <h1 data-i18n="appTitle">策略切换</h1>
      <p data-i18n="appSubtitle">选平台、目标账号和策略，一次执行完成切换。</p>
    </div>
    <div class="top-actions">
      <span class="pill ready auth-status" id="auth-status" hidden></span>
      <button class="btn lang-toggle" id="lang-button" type="button" aria-label="Language">EN</button>
      <a class="btn" id="login-link" href="/login" hidden data-i18n="login">登录</a>
      <button class="btn" id="logout-button" type="button" hidden data-i18n="logout">退出</button>
    </div>
  </header>

  <main class="boot-screen" id="boot-screen" role="status" aria-live="polite">
    <div class="boot-panel">
      <span class="boot-kicker" data-i18n="bootKicker">初始化控制台</span>
      <h2 data-i18n="bootTitle">读取策略配置</h2>
      <p id="boot-message" data-i18n="bootMessage">正在读取登录状态、账号配置和当前状态。</p>
      <div class="loading-track" aria-hidden="true"></div>
    </div>
  </main>

  <main class="shell" id="app-shell">
    <nav class="platform-strip" id="platform-strip" aria-label="Platforms"></nav>

    <section class="switch-surface">
      <div class="switch-panel" id="switch-panel">
        <div class="panel-head">
          <span class="eyebrow" data-i18n="activePlatform">当前平台</span>
          <h2 id="platform-title">LongBridge</h2>
        </div>

        <p class="public-note" id="public-note" hidden data-i18n="publicReadonly">登录后查看账号配置。</p>

        <div class="quick-form" id="quick-form">
          <label class="control-block">
            <span data-i18n="account">目标账号</span>
            <select id="account-select"></select>
            <span class="selection-meta" id="account-meta"></span>
          </label>

          <label class="control-block">
            <span data-i18n="strategy">策略</span>
            <select id="strategy-select"></select>
            <span class="selection-meta" id="strategy-meta"></span>
          </label>

          <div class="control-block">
            <span data-i18n="mode">模式</span>
            <div class="mode" id="mode-control">
              <button type="button" data-mode="live" class="active" data-i18n="live">实盘</button>
              <button type="button" data-mode="paper" data-i18n="paper">模拟</button>
            </div>
          </div>
        </div>

        <div class="run-area" id="run-area">
          <button class="run-button" id="dispatch-button" type="button" disabled data-i18n="loginToRun">登录后切换</button>
          <p class="action-note" id="action-note">登录后才可执行切换。</p>
          <p class="toast" id="toast" aria-live="polite"></p>
        </div>
      </div>

      <aside class="summary-panel">
        <div class="summary-head">
          <h2 data-i18n="summary">切换摘要</h2>
          <span class="pill" id="mode-pill">live</span>
        </div>
        <dl class="summary-list" id="summary-list"></dl>
        <div class="summary-actions">
          <button class="btn" id="copy-button" type="button" data-i18n="copySummary">复制摘要</button>
        </div>
      </aside>
    </section>
  </main>

        strategyMeta: "该账号仅显示 {domains} 策略",
        usEquity: "美股",
        hkEquity: "港股",
        currentStrategy: "当前策略",
        nextStrategy: "选择策略",
        notRead: "未读取",
      },
      en: {
        appTitle: "Strategy Switch",
        appSubtitle: "Pick platform, target account, and strategy. One action switches everything.",
        bootKicker: "Starting console",
        bootTitle: "Loading strategy config",
        bootMessage: "Reading session, account config, and current state.",
        bootStrategy: "Reading strategy catalog.",
        bootSession: "Checking sign-in status.",
        bootConfig: "Reading account config and current state.",
        bootPublic: "Public preview is ready.",
        login: "Sign in",
        logout: "Sign out",
        signedInAs: "Signed in as {login}",
        activePlatform: "Active Platform",
        account: "Target account",
        strategy: "Strategy",
        mode: "Mode",
        live: "Live",
        paper: "Dry run",
        summary: "Current Config",
        copySummary: "Copy state",
        loginToRun: "Sign in to switch",
        loadingConfig: "Loading config",
        configureAccounts: "Configure accounts",
        runSwitch: "Switch now",
        readonlyNote: "Sign in to switch.",
        publicReadonly: "Sign in to view account config.",
        loadingConfigNote: "Reading account config and current state.",
        missingConfigNote: "Account config is not loaded, so switching is disabled.",
        readyNote: "This dispatches the workflow and syncs the target platform service.",
        invalidStrategyNote: "This account has no runnable strategy, so switching is disabled.",
        noAccount: "No accounts",
        noStrategy: "No supported strategies",
        repository: "Repository",
        selectedAccount: "Account",
        selectedMarket: "Market",
        copied: "State copied",
        dispatching: "Dispatching workflow...",
        dispatched: "Workflow dispatched",
        dispatchFailed: "Dispatch failed",
        targetMeta: "target {target} · service {service} · market {domains}",
        strategyMeta: "This account only shows {domains} strategies",
        usEquity: "US equity",
        hkEquity: "HK equity",
        currentStrategy: "Current strategy",
        nextStrategy: "Selected strategy",
        notRead: "Not read",
      },
    };

    const storedLang = localStorage.getItem("qsl-switch-lang");
    const initialLang = storedLang === "zh" || storedLang === "en"
      ? storedLang
      : ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en");
    const clone = (value) => JSON.parse(JSON.stringify(value));

    const state = {
      selected: "longbridge",
      lang: initialLang,
      appReady: false,
      bootMessageKey: "bootMessage",
      auth: { available: false, allowed: false, admin: false, login: null },
      accountOptions: clone(defaultAccountOptions),
      currentStrategies: {},
      configSource: "default",
      repositories: clone(defaultRepositories),
      forms: {
        longbridge: { accountKey: "preview", strategy: "", executionMode: "live" },
        ibkr: { accountKey: "preview", strategy: "", executionMode: "live" },
        schwab: { accountKey: "preview", strategy: "", executionMode: "live" },
        firstrade: { accountKey: "preview", strategy: "", executionMode: "live" },
      },
    };

    const el = (id) => document.getElementById(id);
    const t = (key) => copy[state.lang][key] || copy.en[key] || key;

    function optionsFor(platform) {
      return state.accountOptions[platform] && state.accountOptions[platform].length
        ? state.accountOptions[platform]
        : defaultAccountOptions[platform];
    }

    function selectedAccount(platform = state.selected) {
      const options = optionsFor(platform);
      const form = state.forms[platform];
      return options.find((option) => option.key === form.accountKey) || options[0];
    }

    function hasPrivateConfig() {
      return Boolean(state.auth.allowed && state.configSource === "private");
    }

    function cleanStrategyProfile(value) {
      const profile = String(value || "").trim();
      return /^[a-z0-9._=-]{1,120}$/.test(profile) ? profile : "";
    }

    function cleanStrategyDomain(value) {
      const domain = String(value || "").trim();
      return strategyDomains.includes(domain) ? domain : "";
    }

    function domainLabel(domain) {
      if (domain === "hk_equity") return t("hkEquity");
      return t("usEquity");
    }

    function applyStrategyProfiles(rawProfiles) {
      const profiles = Array.isArray(rawProfiles) && rawProfiles.length
        ? rawProfiles
        : defaultStrategyProfiles;
      const nextOptions = [];
      const nextLabels = {};
      const nextCatalog = {};
      for (const item of profiles) {
        const profile = cleanStrategyProfile(item?.profile || item?.strategy_profile);
        if (!profile || nextOptions.includes(profile)) continue;
        if (item?.runtime_enabled === false || item?.live_enabled === false) continue;
        const domain = cleanStrategyDomain(item?.domain || "us_equity");
        if (!domain) continue;
        nextOptions.push(profile);
        nextLabels[profile] = String(item?.label || item?.display_name || profile).trim() || profile;
        nextCatalog[profile] = {
          profile,
          label: nextLabels[profile],
          domain,
          runtime_enabled: true,
        };
      }
      if (!nextOptions.length && profiles !== defaultStrategyProfiles) return applyStrategyProfiles(defaultStrategyProfiles);
      strategyOptions = nextOptions;
      strategyLabels = nextLabels;
      strategyCatalog = nextCatalog;
    }

    function supportedDomainsForAccount(platform, account) {
      if (Array.isArray(account?.supported_domains) && account.supported_domains.length) {
        const cleaned = account.supported_domains.map(cleanStrategyDomain).filter(Boolean);
        if (cleaned.length) return [...new Set(cleaned)];
      }
      return inferSupportedDomains(platform, account);
    }

    function inferSupportedDomains(platform, account) {
      void account;
      if (platform === "longbridge" || platform === "ibkr") return ["us_equity", "hk_equity"];
      return ["us_equity"];
    }

    function supportedDomainLabel(platform, account) {
      return supportedDomainsForAccount(platform, account).map(domainLabel).join(" / ");
    }

    function strategyAllowedForAccount(platform, account, profile) {
      const cleanProfile = cleanStrategyProfile(profile);
      const catalogEntry = strategyCatalog[cleanProfile];
      if (!catalogEntry || catalogEntry.runtime_enabled !== true) return false;
      return supportedDomainsForAccount(platform, account).includes(catalogEntry.domain);
    }

    function strategyChoicesForAccount(platform = state.selected, account = selectedAccount(platform)) {
      const choices = strategyOptions.filter((profile) => strategyAllowedForAccount(platform, account, profile));
      const addChoice = (value) => {
        const profile = cleanStrategyProfile(value);
        if (profile && !choices.includes(profile) && strategyAllowedForAccount(platform, account, profile)) {
          choices.push(profile);
        }
      };
      if (account) {
        addChoice(account.default_strategy_profile || account.strategy_profile);
        addChoice(currentStrategyForAccount(platform, account));
      }
      return choices;
    }

    function strategyLabel(profile) {
      return strategyLabels[profile] || profile;
    }

    function modeLabel(mode) {
      return mode === "paper" ? t("paper") : t("live");
    }

    function currentEntryForAccount(platform, account) {
      const byPlatform = state.currentStrategies[platform] || {};
      const keys = [account?.key, account?.target_name, account?.label]
        .filter(Boolean)
        .map((value) => String(value));
      for (const key of keys) {
        const entry = byPlatform[key];
        const profile = cleanStrategyProfile(entry?.strategy_profile);
        if (profile) return entry;
      }
      return null;
    }

    function currentStrategyForAccount(platform, account) {
      const entry = currentEntryForAccount(platform, account);
      const profile = cleanStrategyProfile(entry?.strategy_profile);
      return profile || "";
    }

    function normalizeExecutionMode(value, dryRunOnly) {
      const mode = String(value || "").trim().toLowerCase();
      if (mode === "live" || mode === "paper") return mode;
      if (dryRunOnly === true || dryRunOnly === "true" || dryRunOnly === "1" || dryRunOnly === 1) return "paper";
      if (dryRunOnly === false || dryRunOnly === "false" || dryRunOnly === "0" || dryRunOnly === 0) return "live";
      return "";
    }

    function defaultExecutionModeForAccount(platform, account, fallback = "live") {
      const currentMode = normalizeExecutionMode(
        currentEntryForAccount(platform, account)?.execution_mode,
        currentEntryForAccount(platform, account)?.dry_run_only,
      );
      if (currentMode) return currentMode;
      const hint = [
        account?.key,
        account?.label,
        account?.target_name,
        account?.deployment_selector,
        account?.account_scope,
        account?.service_name,
      ].join(" ").toLowerCase();
      if (hint.split(/\s+/).includes("paper") || hint.includes("-paper") || hint.includes("_paper")) {
        return "paper";
      }
      return fallback;
    }

    function defaultStrategyForAccount(platform, account, fallback = "tqqq_growth_income") {
      const currentProfile = currentStrategyForAccount(platform, account);
      if (currentProfile && strategyAllowedForAccount(platform, account, currentProfile)) return currentProfile;
      const profile = cleanStrategyProfile(account?.default_strategy_profile || account?.strategy_profile);
      if (profile && strategyAllowedForAccount(platform, account, profile)) return profile;
      const hint = [
        account?.key,
        account?.label,
        account?.target_name,
        account?.deployment_selector,
        account?.account_scope,
        account?.service_name,
      ].join(" ").toLowerCase();
      const hinted = hint.includes("smart-dca") || hint.includes("smart_dca")
        ? "nasdaq_sp500_smart_dca"
        : (hint.includes("soxl") ? "soxl_soxx_trend_income" : (hint.includes("tqqq") ? "tqqq_growth_income" : ""));
      if (hinted && strategyAllowedForAccount(platform, account, hinted)) return hinted;
      if (fallback && strategyAllowedForAccount(platform, account, fallback)) return fallback;
      return strategyChoicesForAccount(platform, account)[0] || "";
    }

    function syncStrategyForAccount(platform) {
      const account = selectedAccount(platform);
      if (!account) return;
      state.forms[platform].strategy = defaultStrategyForAccount(platform, account, state.forms[platform].strategy);
      state.forms[platform].executionMode = defaultExecutionModeForAccount(
        platform,
        account,
      );
    }

    function ensureAccountSelection(platform) {
      const options = optionsFor(platform);
      if (!options.length) return;
      if (!options.some((option) => option.key === state.forms[platform].accountKey)) {
        state.forms[platform].accountKey = options[0].key;
        state.forms[platform].strategy = defaultStrategyForAccount(platform, options[0], state.forms[platform].strategy);
      }
    }

    function derivedService(platform, targetName) {
      if (platform === "longbridge") return `longbridge-quant-${targetName.toLowerCase()}-service`;
      if (platform === "ibkr") return `interactive-brokers-${targetName.toLowerCase()}-service`;
      if (platform === "schwab") return "charles-schwab-quant-service";
      if (platform === "firstrade") return "firstrade-quant-service";
      return "";
    }

    function accountMetaText(platform = state.selected) {
      const account = selectedAccount(platform);
      const targetName = account.target_name || account.key;
      const service = account.service_name || derivedService(platform, targetName);
      return t("targetMeta")
        .replace("{target}", targetName)
        .replace("{service}", service)
        .replace("{domains}", supportedDomainLabel(platform, account));
    }

    function hasValidStrategySelection(platform = state.selected) {
      const form = state.forms[platform];
      const account = selectedAccount(platform);
      return Boolean(form?.strategy && account && strategyAllowedForAccount(platform, account, form.strategy));
    }

    function buildInputs(platform = state.selected) {
      const form = state.forms[platform];
      const account = selectedAccount(platform);
      const targetName = account.target_name || account.key;
      const inputs = {
        platform,
        target_name: targetName,
        strategy_profile: form.strategy,
        execution_mode: form.executionMode,
        variable_scope: account.variable_scope || "default",
        plugin_mode: account.plugin_mode || "auto",
        service_targets_mode: "auto",
        apply: "true",
        trigger_platform_sync: "true",
        confirm_apply: "APPLY_AND_SYNC",
        platform_sync_workflow: "sync-cloud-run-env.yml",
      };
      for (const field of [
        "github_environment",
        "deployment_selector",
        "account_selector",
        "account_scope",
        "service_name",
      ]) {
        if (account[field]) inputs[field] = account[field];
      }
      return inputs;
    }

    function summaryRows(inputs) {
      const account = selectedAccount();
      const currentProfile = currentStrategyForAccount(state.selected, account);
      const rows = [
        [t("repository"), state.repositories[state.selected] || defaultRepositories[state.selected]],
        [t("selectedAccount"), account.label],
        [t("selectedMarket"), supportedDomainLabel(state.selected, account)],
        [t("nextStrategy"), strategyLabel(inputs.strategy_profile)],
      ];
      if (state.auth.allowed) {
        rows.splice(2, 0, [t("currentStrategy"), currentProfile ? strategyLabel(currentProfile) : t("notRead")]);
      }
      return rows;
    }

    function applyLanguage() {
      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      el("lang-button").textContent = state.lang === "zh" ? "EN" : "中";
    }

    function renderPlatforms() {
      const strip = el("platform-strip");
      strip.replaceChildren();
      const showPrivateConfig = hasPrivateConfig();
      for (const platform of Object.keys(platformMeta)) {
        ensureAccountSelection(platform);
        const meta = platformMeta[platform];
        const form = state.forms[platform];
        const account = selectedAccount(platform);
        const button = document.createElement("button");
        button.className = "platform-button";
        button.type = "button";
        button.dataset.platform = platform;
        button.classList.toggle("active", platform === state.selected);
        const mark = document.createElement("span");
        mark.className = "mark";
        mark.textContent = meta.code;
        const copyNode = document.createElement("span");
        copyNode.className = "platform-copy";
        const labelNode = document.createElement("strong");
        labelNode.textContent = meta.label;
        copyNode.append(labelNode);
        if (showPrivateConfig) {
          const accountNode = document.createElement("span");
          accountNode.textContent = account.label;
          const strategyNode = document.createElement("small");
          strategyNode.textContent = strategyLabel(form.strategy);
          copyNode.append(accountNode, strategyNode);
        }
        button.append(mark, copyNode);
        strip.appendChild(button);
      }
    }

    function renderControls() {
      const platform = state.selected;
      const meta = platformMeta[platform];
      const form = state.forms[platform];
      const accounts = optionsFor(platform);
      const account = selectedAccount(platform);
      const choices = strategyChoicesForAccount(platform, account);
      const accountSelect = el("account-select");
      const strategySelect = el("strategy-select");
      const showPrivateControls = hasPrivateConfig();

      el("switch-panel").style.setProperty("--platform-color", meta.accent);
      el("platform-title").textContent = meta.label;
      el("quick-form").hidden = !showPrivateControls;
      el("run-area").hidden = !showPrivateControls;
      el("public-note").hidden = showPrivateControls;
      el("public-note").textContent = state.auth.allowed ? t("missingConfigNote") : t("publicReadonly");

      if (!showPrivateControls) {
        accountSelect.replaceChildren();
        strategySelect.replaceChildren();
        el("account-meta").textContent = "";
        el("strategy-meta").textContent = "";
        return;
      }

      accountSelect.replaceChildren();
      if (accounts.length) {
        for (const account of accounts) {
          accountSelect.append(new Option(account.label, account.key, false, account.key === form.accountKey));
        }
      } else {
        accountSelect.append(new Option(t("noAccount"), ""));
      }
      el("account-meta").textContent = accounts.length ? accountMetaText(platform) : "";

      if (choices.length && !choices.includes(form.strategy)) {
        form.strategy = choices[0];
      }
      strategySelect.disabled = !choices.length;
      strategySelect.replaceChildren();
      if (choices.length) {
        for (const strategy of choices) {
          strategySelect.append(new Option(strategyLabel(strategy), strategy, false, strategy === form.strategy));
        }
      } else {
        strategySelect.append(new Option(t("noStrategy"), ""));
      }
      el("strategy-meta").textContent = account
        ? t("strategyMeta").replace("{domains}", supportedDomainLabel(platform, account))
        : "";

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === form.executionMode);
      });
    }

    function renderSummary() {
      const showSummary = hasPrivateConfig();
      const summaryPanel = document.querySelector(".summary-panel");
      const switchSurface = document.querySelector(".switch-surface");
      summaryPanel.hidden = !showSummary;
      switchSurface.classList.toggle("summary-hidden", !showSummary);
      if (!showSummary) return;

      const inputs = buildInputs();
      const list = el("summary-list");
      list.replaceChildren();
      document.querySelector(".summary-head h2").textContent = t("summary");
      for (const [label, value] of summaryRows(inputs)) {
        const row = document.createElement("div");
        row.className = "summary-row";
        const labelNode = document.createElement("dt");
        labelNode.textContent = label;
        const valueNode = document.createElement("dd");
        valueNode.textContent = value;
        row.append(labelNode, valueNode);
        list.appendChild(row);
      }

      const account = selectedAccount();
      const currentEntry = currentEntryForAccount(state.selected, account);
      const currentMode = normalizeExecutionMode(currentEntry?.execution_mode, currentEntry?.dry_run_only);
      el("mode-pill").textContent = currentMode ? modeLabel(currentMode) : t("notRead");
    }

    function renderAuth() {
      const status = el("auth-status");
      const loginLink = el("login-link");
      const logoutButton = el("logout-button");
      const signedIn = Boolean(state.auth.allowed && state.auth.login);

      status.hidden = !signedIn;
      status.textContent = signedIn ? t("signedInAs").replace("{login}", state.auth.login) : "";
      loginLink.hidden = !state.auth.available || signedIn;
      loginLink.href = "/login";
      loginLink.textContent = t("login");
      logoutButton.hidden = !signedIn;
      logoutButton.textContent = t("logout");

      const dispatch = el("dispatch-button");
      const hasPrivateAccounts = state.configSource === "private";
      const loadingConfig = state.configSource === "loading";
      const hasValidStrategy = hasValidStrategySelection();
      dispatch.disabled = !state.auth.allowed || loadingConfig || !hasPrivateAccounts || !hasValidStrategy;
      dispatch.textContent = state.auth.allowed
        ? (loadingConfig ? t("loadingConfig") : (hasPrivateAccounts ? t("runSwitch") : t("configureAccounts")))
        : t("loginToRun");
      const note = el("action-note");
      note.textContent = state.auth.allowed
        ? (loadingConfig
          ? t("loadingConfigNote")
          : (hasPrivateAccounts ? (hasValidStrategy ? t("readyNote") : t("invalidStrategyNote")) : t("missingConfigNote")))
        : t("readonlyNote");
      note.classList.toggle("warning", state.auth.allowed && !loadingConfig && (!hasPrivateAccounts || !hasValidStrategy));
    }

    function renderAppVisibility() {
      document.body.classList.toggle("app-loading", !state.appReady);
      el("boot-message").textContent = t(state.bootMessageKey);
    }

    function render() {
      applyLanguage();
      renderPlatforms();
      renderControls();
      renderSummary();
      renderAuth();
      renderAppVisibility();
    }

    async function refreshSession() {
      state.bootMessageKey = "bootSession";
      render();
      try {
        const response = await fetch("/api/session", { cache: "no-store" });
        if (!response.ok) throw new Error("no backend");
        const session = await response.json();
        state.auth = {
          available: true,
          allowed: Boolean(session.allowed),
          admin: Boolean(session.admin),
          login: session.login || null,
        };
      } catch {
        state.auth = { available: false, allowed: false, admin: false, login: null };
      }
      if (state.auth.allowed) {
        await refreshConfig();
      } else {
        state.bootMessageKey = "bootPublic";
        state.appReady = true;
        render();
      }
    }

    async function refreshStrategyProfiles() {
      state.bootMessageKey = "bootStrategy";
      render();
      try {
        const response = await fetch("/api/strategy-profiles", { cache: "no-store" });
        if (!response.ok) throw new Error("no strategy profiles");
        const payload = await response.json();
        applyStrategyProfiles(payload.strategyProfiles || []);
        for (const platform of Object.keys(platformMeta)) syncStrategyForAccount(platform);
        render();
      } catch {
        applyStrategyProfiles(defaultStrategyProfiles);
        for (const platform of Object.keys(platformMeta)) syncStrategyForAccount(platform);
      }
    }

    async function refreshConfig() {
      if (!state.auth.available || !state.auth.allowed) return;
      state.configSource = "loading";
      state.bootMessageKey = "bootConfig";
      render();
      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) throw new Error("no config");
        const payload = await response.json();
        if (payload.accountOptions) {
          applyStrategyProfiles(payload.strategyProfiles || defaultStrategyProfiles);
          state.accountOptions = normalizeAccountOptions(payload.accountOptions);
          state.repositories = normalizePlatformRepositories(payload.platformRepositories || {});
          state.currentStrategies = normalizeCurrentStrategies(payload.currentStrategies || {});
          state.configSource = "private";
          for (const platform of Object.keys(platformMeta)) {
            ensureAccountSelection(platform);
            syncStrategyForAccount(platform);
          }
        } else {
          state.configSource = "default";
          state.currentStrategies = {};
        }
      } catch {
        state.configSource = "default";
        state.currentStrategies = {};
      } finally {
        state.appReady = true;
        render();
      }
    }

    function normalizeAccountOptions(raw) {
      const normalized = clone(defaultAccountOptions);
      for (const platform of Object.keys(platformMeta)) {
        if (!Array.isArray(raw[platform]) || !raw[platform].length) continue;
        normalized[platform] = raw[platform].map((item, index) => ({
          key: String(item.key || item.target_name || index),
          label: String(item.label || item.target_name || item.key || platform),
          target_name: String(item.target_name || item.key || ""),
          account_selector: item.account_selector ? String(item.account_selector) : "",
          deployment_selector: item.deployment_selector ? String(item.deployment_selector) : "",
          account_scope: item.account_scope ? String(item.account_scope) : "",
          service_name: item.service_name ? String(item.service_name) : "",
          supported_domains: normalizeSupportedDomains(platform, item),
          default_strategy_profile: item.default_strategy_profile || item.strategy_profile
            ? String(item.default_strategy_profile || item.strategy_profile)
            : "",
          github_environment: item.github_environment ? String(item.github_environment) : "",
          variable_scope: item.variable_scope ? String(item.variable_scope) : "",
          plugin_mode: item.plugin_mode ? String(item.plugin_mode) : "",
        }));
      }
      return normalized;
    }

    function normalizeSupportedDomains(platform, item) {
      const raw = Array.isArray(item?.supported_domains)
        ? item.supported_domains
        : String(item?.supported_domains || "").split(/[\s,;]+/);
      const cleaned = raw.map(cleanStrategyDomain).filter(Boolean);
      if (cleaned.length) return [...new Set(cleaned)];
      return inferSupportedDomains(platform, item || {});
    }

    function normalizeCurrentStrategies(raw) {
      const normalized = {};
      for (const platform of Object.keys(platformMeta)) {
        if (!raw[platform] || typeof raw[platform] !== "object" || Array.isArray(raw[platform])) continue;
        normalized[platform] = {};
        for (const [key, entry] of Object.entries(raw[platform])) {
          const profile = cleanStrategyProfile(entry?.strategy_profile);
          if (!profile) continue;
          normalized[platform][String(key)] = {
            strategy_profile: profile,
            execution_mode: normalizeExecutionMode(entry?.execution_mode, entry?.dry_run_only),
            dry_run_only: entry?.dry_run_only === true || entry?.dry_run_only === "true" || entry?.dry_run_only === "1",
            source: entry?.source ? String(entry.source) : "",
          };
        }
        if (!Object.keys(normalized[platform]).length) delete normalized[platform];
      }
      return normalized;
    }

    function normalizePlatformRepositories(raw) {
      const normalized = clone(defaultRepositories);
      if (!raw || typeof raw !== "object" || Array.isArray(raw)) return normalized;
      for (const platform of Object.keys(platformMeta)) {
        const repository = String(raw[platform] || "").trim();
        if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repository)) {
          normalized[platform] = repository;
        }
      }
      return normalized;
    }

    async function dispatchSwitch() {
      if (!state.auth.allowed) return;
      el("toast").textContent = t("dispatching");
      try {
        const response = await fetch("/api/switch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildInputs()),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || t("dispatchFailed"));
        el("toast").textContent = t("dispatched");
        if (payload.actions_url) window.open(payload.actions_url, "_blank", "noopener,noreferrer");
      } catch (error) {
        el("toast").textContent = `${t("dispatchFailed")}: ${error.message}`;
      }
    }

    async function handleLogout() {
      await fetch("/api/logout", { method: "POST" });
      window.location.reload();
    }

    function summaryText() {
      const inputs = buildInputs();
      return summaryRows(inputs).map(([label, value]) => `${label}: ${value}`).join("\n");
    }

    el("platform-strip").addEventListener("click", (event) => {
      const button = event.target.closest("[data-platform]");
      if (!button) return;
      state.selected = button.dataset.platform;
      render();
    });

    el("account-select").addEventListener("change", () => {
      state.forms[state.selected].accountKey = el("account-select").value;
      syncStrategyForAccount(state.selected);
      render();
    });

    el("strategy-select").addEventListener("change", () => {
      state.forms[state.selected].strategy = el("strategy-select").value;
      render();
    });

    el("mode-control").addEventListener("click", (event) => {
      const button = event.target.closest("[data-mode]");
      if (!button) return;
      state.forms[state.selected].executionMode = button.dataset.mode;
      render();
    });

    el("copy-button").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(summaryText());
        el("toast").textContent = t("copied");
      } catch {
        el("toast").textContent = summaryText();
      }
    });

    el("dispatch-button").addEventListener("click", dispatchSwitch);
    el("logout-button").addEventListener("click", handleLogout);
    el("lang-button").addEventListener("click", () => {
      state.lang = state.lang === "zh" ? "en" : "zh";
      localStorage.setItem("qsl-switch-lang", state.lang);
      render();
    });

    applyStrategyProfiles(defaultStrategyProfiles);
    for (const platform of Object.keys(platformMeta)) syncStrategyForAccount(platform);
    render();
    boot();

    async function boot() {
      await refreshStrategyProfiles();
      await refreshSession();
    }
  </script>
</body>
</html>
