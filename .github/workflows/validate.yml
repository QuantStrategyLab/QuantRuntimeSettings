name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate runtime targets
        run: python3 scripts/runtime_settings.py validate
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

